<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Formulas Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            margin-top: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            font-weight: bold;
        }
        .section {
            margin-bottom: 30px;
        }
        .result {
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">

    <h1 class="text-center">Financial Investment Platform</h1>

    <!-- SDR Calculation Section -->
    <div class="section">
        <h3>Special Drawing Rights (SDR)</h3>
        <label for="quotaShare">Member Quota Share:</label>
        <input type="number" id="quotaShare" class="form-control" placeholder="Enter Member Quota Share" required>
        <label for="totalQuota">Total IMF Quota:</label>
        <input type="number" id="totalQuota" class="form-control" placeholder="Enter Total IMF Quota" required>
        <button id="calculateSDR" class="btn btn-primary mt-2">Calculate SDR Allocation</button>
        <div id="sdrResult" class="result"></div>
    </div>

    <!-- Debt Management Section -->
    <div class="section">
        <h3>Debt Sustainability</h3>
        <label for="totalDebt">Total Debt:</label>
        <input type="number" id="totalDebt" class="form-control" placeholder="Enter Total Debt" required>
        <label for="gdp">GDP:</label>
        <input type="number" id="gdp" class="form-control" placeholder="Enter GDP" required>
        <label for="debtService">Debt Service Payments:</label>
        <input type="number" id="debtService" class="form-control" placeholder="Enter Debt Service Payments" required>
        <button id="calculateDebtSustainability" class="btn btn-primary mt-2">Calculate Debt-to-GDP Ratio</button>
        <div id="debtResult" class="result"></div>
    </div>

    <!-- Balance of Payments Section -->
    <div class="section">
        <h3>Balance of Payments (BOP)</h3>
        <label for="directInvest">Direct Investment:</label>
        <input type="number" id="directInvest" class="form-control" placeholder="Enter value for direct investment" required>
        <label for="portfolioInvest">Portfolio Investment:</label>
        <input type="number" id="portfolioInvest" class="form-control" placeholder="Enter value for portfolio investment" required>
        <label for="otherInvest">Other Investments:</label>
        <input type="number" id="otherInvest" class="form-control" placeholder="Enter value for other investments" required>
        <label for="exports">Exports:</label>
        <input type="number" id="exports" class="form-control" placeholder="Enter value for exports" required>
        <label for="imports">Imports:</label>
        <input type="number" id="imports" class="form-control" placeholder="Enter value for imports" required>
        <button id="calculateBOP" class="btn btn-primary mt-2">Calculate BOP</button>
        <div id="bopResult" class="result"></div>
    </div>

    <!-- Data and Cybersecurity Section -->
    <div class="section">
        <h3>Data Security & Cybersecurity</h3>
        <label for="dataSecurity">Data Security (CIA - Confidentiality, Integrity, Availability):</label>
        <input type="number" id="dataSecurity" class="form-control" placeholder="Enter data security value" required>
        <label for="latency">Data Latency (Distance / Transmission Speed):</label>
        <input type="number" id="latency" class="form-control" placeholder="Enter data latency value" required>
        <button id="calculateSecurity" class="btn btn-primary mt-2">Calculate Data Security</button>
        <div id="securityResult" class="result"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Calculate SDR Allocation
    document.getElementById('calculateSDR').addEventListener('click', function() {
        const quotaShare = parseFloat(document.getElementById('quotaShare').value);
        const totalQuota = parseFloat(document.getElementById('totalQuota').value);
        if (!isNaN(quotaShare) && !isNaN(totalQuota)) {
            const sdrAllocation = (quotaShare / totalQuota) * 100;
            document.getElementById('sdrResult').textContent = 'SDR Allocation: ' + sdrAllocation.toFixed(2) + '%';
        } else {
            alert('Please enter valid values for quota share and total quota.');
        }
    });

    // Calculate Debt-to-GDP Ratio
    document.getElementById('calculateDebtSustainability').addEventListener('click', function() {
        const totalDebt = parseFloat(document.getElementById('totalDebt').value);
        const gdp = parseFloat(document.getElementById('gdp').value);
        if (!isNaN(totalDebt) && !isNaN(gdp)) {
            const debtToGDP = (totalDebt / gdp) * 100;
            document.getElementById('debtResult').textContent = 'Debt-to-GDP Ratio: ' + debtToGDP.toFixed(2) + '%';
        } else {
            alert('Please enter valid values for total debt and GDP.');
        }
    });

    // Calculate Balance of Payments (BOP)
    document.getElementById('calculateBOP').addEventListener('click', function() {
        const directInvest = parseFloat(document.getElementById('directInvest').value);
        const portfolioInvest = parseFloat(document.getElementById('portfolioInvest').value);
        const otherInvest = parseFloat(document.getElementById('otherInvest').value);
        const exports = parseFloat(document.getElementById('exports').value);
        const imports = parseFloat(document.getElementById('imports').value);

        if (!isNaN(directInvest) && !isNaN(portfolioInvest) && !isNaN(otherInvest) && !isNaN(exports) && !isNaN(imports)) {
            const currentAccount = exports - imports;
            const capitalAccount = directInvest + portfolioInvest + otherInvest;
            const bop = currentAccount + capitalAccount;
            document.getElementById('bopResult').textContent = 'Balance of Payments (BOP): ' + bop.toFixed(2);
        } else {
            alert('Please enter valid values for all fields.');
        }
    });

    // Calculate Data Security and Latency
    document.getElementById('calculateSecurity').addEventListener('click', function() {
        const dataSecurity = parseFloat(document.getElementById('dataSecurity').value);
        const latency = parseFloat(document.getElementById('latency').value);

        if (!isNaN(dataSecurity) && !isNaN(latency)) {
            const securityValue = dataSecurity * latency;
            document.getElementById('securityResult').textContent = 'Data Security Value: ' + securityValue.toFixed(2);
        } else {
            alert('Please enter valid values for data security and latency.');
        }
    });
</script>

</body>
</html>
