<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Cricket Scoring DApp — Prototype</title>
  <style>
    body { font-family: Inter, system-ui, -apple-system, sans-serif; margin: 0; background:#0f172a; color:#e6eef8; }
    .app { display: grid; grid-template-columns: 1fr 360px; gap: 12px; height: 100vh; padding: 12px; }
    .panel { background: linear-gradient(180deg,#0b1220, #071022); border-radius: 12px; padding: 12px; box-shadow: 0 6px 18px rgba(2,6,23,.6); }
    video { width:100%; height: auto; border-radius:12px; background: black; }
    canvas { position: absolute; left:12px; top:12px; pointer-events:none; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; }
    button { background:#2563eb; border:none; padding:8px 10px; border-radius:8px; color:white; cursor:pointer; }
    button.secondary { background:#1f2937; }
    .log { max-height:60vh; overflow:auto; padding:8px; font-size:14px; }
    .score { font-size:18px; margin-bottom:8px; }
    .badge { background:#0b1220; padding:6px 8px; border-radius:999px; display:inline-block; }
    .small { font-size:13px; opacity:.85 }
    .stats-table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    .stats-table th, .stats-table td { padding: 10px; border: 1px solid #ccc; text-align: center; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel" id="main">
      <!-- Video and Detection Setup -->
      <div style="position:relative">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="overlay"></canvas>
      </div>
      <div style="margin-top:10px; display:flex; align-items:center; justify-content:space-between">
        <div class="controls">
          <button id="startBtn">Start</button>
          <button id="stopBtn" class="secondary">Stop</button>
          <button id="exportBtn">Export JSON</button>
          <button id="resetBtn" class="secondary">Reset</button>
        </div>
        <div class="small">Frame interval: <span id="interval">200ms</span></div>
      </div>
      <hr />
      <!-- Scoring Panel -->
      <div style="margin-top:10px; display:flex; gap:8px; align-items:center">
        <button id="markRun">Mark Run</button>
        <button id="markWicket">Mark Wicket</button>
        <button id="markWide">Mark Wide</button>
        <button id="markNoBall">Mark No-ball</button>
        <button id="markPenalty">Mark Penalty</button>
      </div>

      <h3 style="margin-top:12px">Detection log / manual review</h3>
      <div class="log" id="log"></div>
    </div>

    <div class="panel" id="side">
      <h2>Scorecard</h2>
      <div class="score" id="scorecard">Overs: 0.0<br/>Runs: 0<br/>Wickets: 0</div>

      <h3>Configuration</h3>
      <label class="small">Model interval (ms)</label>
      <input id="modelInterval" type="range" min="100" max="1000" step="50" value="200" />
      <div style="height:8px"></div>

      <h3>Teams and Players</h3>
      <div>
        <label for="teamA">Team A</label>
        <input id="teamA" type="text" placeholder="Enter team A name">
      </div>
      <div>
        <label for="teamB">Team B</label>
        <input id="teamB" type="text" placeholder="Enter team B name">
      </div>
      <div>
        <label for="players">Players</label>
        <textarea id="players" placeholder="Enter player names, one per line"></textarea>
      </div>

      <h3>Practice Player Stats</h3>
      <button id="startPracticeBtn">Start Practice</button>
      <button id="endPracticeBtn">End Practice</button>
      <div id="playerStatsReport"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@0.0.9"></script>
  <script>
    let cocoModel = null;
    let poseModel = null;
    let running = false;
    let autoConfirm = false;
    let modelInterval = 200;
    const state = {
      runs: 0,
      wickets: 0,
      balls: 0,
      events: [],
      players: [],
      practiceStats: {},
    };

    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
        video.srcObject = stream;
        await video.play();
        overlay.width = video.videoWidth;
        overlay.height = video.videoHeight;
        log('Camera ready: ' + video.videoWidth + 'x' + video.videoHeight);
      } catch (e) {
        alert('Camera access failed: ' + e.message);
      }
    }

    async function loadModels() {
      log('Loading coco-ssd...');
      cocoModel = await cocoSsd.load();
      log('Loaded coco-ssd');

      log('Loading pose-detection MoveNet...');
      const detectorConfig = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
      poseModel = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, detectorConfig);
      log('Loaded pose model');
    }

    function log(txt) {
      const now = new Date().toLocaleTimeString();
      const el = document.createElement('div');
      el.innerHTML = `<span class="small">[${now}]</span> ${txt}`;
      logEl.prepend(el);
    }

    // Scoring button functions
    function confirmRun(runs = 1) {
      state.runs += runs;
      state.balls += 1;
      state.events.push({ type: 'run', runs, time: new Date().toISOString() });
      log(`Run +${runs}`);
    }

    function confirmWicket() {
      state.wickets += 1;
      state.balls += 1;
      state.events.push({ type: 'wicket', time: new Date().toISOString() });
      log('Wicket!');
    }

    // Add players
    function addPlayers() {
      const playerNames = document.getElementById('players').value.split("\n");
      state.players = playerNames;
      log('Players added: ' + state.players.join(', '));
    }

    // End practice and generate player report
    document.getElementById('endPracticeBtn').onclick = () => {
      // Generate and download individual practice performance reports for each player
      state.players.forEach(player => {
        const playerStats = state.practiceStats[player] || { runs: 0, wickets: 0, balls: 0 };
        const playerReport = {
          player: player,
          runs: playerStats.runs,
          wickets: playerStats.wickets,
          balls: playerStats.balls,
        };
        const dataStr = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(playerReport, null, 2));
        const a = document.createElement('a');
        a.setAttribute('href', dataStr);
        a.setAttribute('download', `${player}_practice_report.json`);
        document.body.appendChild(a);
        a.click();
        a.remove();
      });

      // Update practice report UI
      const reportContainer = document.getElementById('playerStatsReport');
      reportContainer.innerHTML = `<h3>Practice Performance Report</h3>`;
      state.players.forEach(player => {
        const stats = state.practiceStats[player] || { runs: 0, wickets: 0, balls: 0 };
        reportContainer.innerHTML += `
          <div><strong>${player}</strong>: Runs: ${stats.runs}, Wickets: ${stats.wickets}, Balls: ${stats.balls}</div>
        `;
      });

      log('Practice session ended, individual reports generated!');
    };

    // Video recording and downloading clips (ball-by-ball)
    document.getElementById('stopBtn').onclick = () => {
      running = false;
      log('Detection stopped');
      
      // Save ball-by-ball video clips
      saveBallByBallClip();

      // Generate match video file (optimizing size for storage)
      optimizeAndSaveVideo();
    };

    function saveBallByBallClip() {
      // Logic for capturing and saving ball-by-ball video clips, ensuring each clip is under the size limit
      const maxSize = 50; // Max size in MB for the entire match video
      const maxBallClipSize = maxSize / 800; // Divide the max size by number of balls in the match (approx. 800 for an ODI)
      const videoData = captureVideoFrame(); // This would be a function that grabs the current video frame

      // Compress and save video clips
      const clipData = compressVideo(videoData, maxBallClipSize);
      downloadClip(clipData);
    }

    function captureVideoFrame() {
      // Capture a single frame from the video
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg');
    }

    function compressVideo(videoData, maxSize) {
      // This function would compress the video data to meet the size limit
      // For simplicity, we are just using an image compression approach here
      // A more advanced solution would require video compression tools (e.g., FFmpeg)
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = videoData.width;
      canvas.height = videoData.height;

      // Compress and resize the image/video frame
      ctx.drawImage(videoData, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.7); // Compress to 70% quality (for example)
    }

    function downloadClip(clipData) {
      const a = document.createElement('a');
      a.href = clipData;
      a.download = 'ball_clip.jpg'; // Save as an image, would need to change for video format
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function optimizeAndSaveVideo() {
      // Create and save an optimized match video file (under the storage size limit)
      const maxFileSize = 50; // Max file size in MB (for the whole match video)
      const videoFile = captureVideo(); // Capture the whole match video

      // Compress and ensure file size is under limit
      const compressedVideo = compressVideo(videoFile, maxFileSize);
      saveMatchVideo(compressedVideo);
    }

    function captureVideo() {
      // Capture the full video from the match
      const videoElement = document.getElementById('video');
      const stream = videoElement.captureStream();
      return stream;
    }

    function saveMatchVideo(videoData) {
      // Save the full match video to file (after compression)
      const a = document.createElement('a');
      const videoBlob = new Blob([videoData], { type: 'video/mp4' });
      const videoUrl = URL.createObjectURL(videoBlob);
      a.href = videoUrl;
      a.download = 'match_video.mp4'; // Save the video as a .mp4 file
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    // Event Handlers for Start/Stop Practice and Match
    document.getElementById('startBtn').onclick = async () => {
      if (!video.srcObject) await initCamera();
      if (!cocoModel || !poseModel) await loadModels();
      running = true;
      detectLoop();
      log('Detection started');
    };

    // Placeholder for actual detection loop
    async function detectLoop() {
      if (!running) return;
      // Detection logic for the game (for simplicity, not implemented here)
      setTimeout(detectLoop, modelInterval);
    }

    // Initial Setup and State Updates
    updateScoreUI();
    log('Prototype loaded — press Start');
  </script>
</body>
</html>
