
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoChat Aid Fund</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #0b0f14;
      --card: #111827;
      --accent: #00f6ff;
      --text: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: system-ui;
      background: var(--bg);
      color: var(--text);
    }
    header, nav {
      background: #020617;
      border-color: #1f2937;
    }
    header {
      display: flex;
      align-items: center;
      padding: 10px;
    }
    header img {
      height: 32px;
      margin-right: 8px;
    }
    .tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid #1f2937;
    }
    .tabs button {
      flex: 1;
      background: none;
      border: none;
      color: #9ca3af;
      padding: 10px;
    }
    .tabs button.active {
      color: var(--accent);
    }
    .feed {
      max-width: 640px;
      margin: auto;
      padding-bottom: 120px;
    }
    .post {
      background: var(--card);
      margin: 12px;
      border-radius: 14px;
      overflow: hidden;
    }
    .post-header {
      padding: 10px;
      font-weight: 600;
    }
    .post img, .post video {
      width: 100%;
    }
    .post-caption {
      padding: 10px;
      font-size: .9rem;
    }
    .fab {
      position: fixed;
      bottom: 90px;
      right: 20px;
      background: var(--accent);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 2rem;
    }
    nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
    footer {
      text-align: center;
      font-size: .75rem;
      color: #6b7280;
      padding: 20px;
    }
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: #020617;
      padding: 14px;
      z-index: 50;
    }
    button, input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      background: #020617;
      color: #fff;
      border: 1px solid #1f2937;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <header>
    <img src="file_00000000edd071f590a2740f51337467.png" alt="Logo">
    <b>PhotoChat Aid Fund</b>
    <div style="margin-left:auto">
      <i class="bi bi-google" onclick="loginGoogle()"></i>
    </div>
  </header>

  <div class="tabs">
    <button class="active" onclick="setTab(this, 'home')">Home</button>
    <button onclick="setTab(this, 'trending')">Trending</button>
    <button onclick="setTab(this, 'random')">Random</button>
    <button onclick="setTab(this, 'sports')">Sports</button>
    <button onclick="setTab(this, 'news')">News</button>
    <button onclick="setTab(this, 'realestate')">Real Estate</button>
    <button onclick="openLive()">Live</button>
  </div>

  <div id="feed" class="feed"></div>
  <div class="fab" onclick="openCreate()">+</div>

  <nav>🏠 🔍 ➕ 💬 👤</nav>

  <footer>© SadiCoin Tech 2026 · PhotoChat Aid Fund</footer>

  <!-- Modals -->
  <div id="liveModal" class="modal">
    <button onclick="closeLive()">⬅ Back</button>
    <video id="liveVideo" autoplay muted playsinline></video>
    <button onclick="startLive()">Go Live</button>
  </div>

  <div id="createModal" class="modal">
    <button onclick="closeCreate()">⬅ Back</button>
    <textarea placeholder="What’s happening?"></textarea>
    <button onclick="closeCreate()">Post</button>
  </div>

  <div id="paymentModal" class="modal">
    <button onclick="closePayment()">⬅ Back</button>
    <h3>Purchase Votes</h3>
    <input type="number" id="numVotes" placeholder="Enter number of votes">
    <button onclick="buyVotesFromAgent()">Buy Votes</button>
  </div>

  <div id="uploadSMEVideoModal" class="modal">
    <button onclick="closeSMEUpload()">⬅ Back</button>
    <input type="file" id="smeVideoFile">
    <button onclick="uploadSMEVideo()">Upload Video</button>
  </div>

  <script>
    const supabase = supabaseJs.createClient(
      "https://jbhhfzbhcvzxtthhmfhz.supabase.co",
      "YOUR_SUPABASE_ANON_KEY_HERE"
    );

    const demoPosts = {
      home: [
        { u: "Anonymous", t: "Welcome to PhotoChat Aid Fund", img: "https://picsum.photos/600/400?1" },
        { u: "Marketing", t: "Promoted post", img: "https://picsum.photos/600/400?2" }
      ],
      trending: [
        { u: "🔥 Viral", t: "Trending now", img: "https://picsum.photos/600/400?3" }
      ],
      random: [
        { u: "Random", t: "Just vibes", img: "https://picsum.photos/600/400?4" }
      ],
      sports: [
        { u: "Sports Live", t: "Match highlights", img: "https://picsum.photos/600/400?5" }
      ],
      news: [
        { u: "News", t: "Breaking update", img: "https://picsum.photos/600/400?6" }
      ],
      realestate: [
        { u: "Agent", t: "2 Bed Apartment – R6,500", img: "https://picsum.photos/600/400?7" }
      ]
    };

    function setTab(btn, type) {
      document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render(demoPosts[type]);
    }

    function render(list) {
      feed.innerHTML = "";
      list.forEach(p => {
        feed.innerHTML += `
          <div class="post">
            <div class="post-header">${p.u}</div>
            <img src="${p.img}">
            <div class="post-caption">${p.t}</div>
          </div>`;
      });
    }

    async function loginGoogle() {
      await supabase.auth.signInWithOAuth({ provider: "google" });
    }

    async function startLive() {
      const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      liveVideo.srcObject = s;
    }

    function openLive() { liveModal.style.display = "block"; }
    function closeLive() { liveModal.style.display = "none"; }
    function openCreate() { createModal.style.display = "block"; }
    function closeCreate() { createModal.style.display = "none"; }

    // Payment Modal Functions
    function openPayment() { paymentModal.style.display = "block"; }
    function closePayment() { paymentModal.style.display = "none"; }

    function buyVotesFromAgent() {
      const numVotes = document.getElementById("numVotes").value;
      const agentId = "agent123"; // Example: Get agent ID from UI or session
      const receipt = buyVotes(agentId, numVotes);
      alert(`Vote purchase successful. Receipt generated.`);
    }

    function buyVotes(agentId, numVotes) {
      const votePrice = 10; // SDC tokens per vote
      const totalCost = numVotes * votePrice;
      const receipt = generateReceipt({ amount: totalCost, method: "Agent Payment", transactionId: agentId });
      return receipt;
    }

    function generateReceipt(paymentDetails) {
        const receipt = {
          tokenAmount: paymentDetails.amount,
          transactionId: paymentDetails.transactionId,
          paymentMethod: paymentDetails.method,
          receiptDate: new Date().toLocaleString(),
        };
        // Display receipt in the console or send to the user's email
        console.log('Receipt generated:', receipt);
        return receipt;
      }

      // SME Video Upload Functionality
      async function uploadSMEVideo() {
        const smeId = "sme123"; // Example SME ID
        const file = document.getElementById("smeVideoFile").files[0];
        if (file) {
          const { data, error } = await supabase.storage
            .from('sme-videos')
            .upload(`${smeId}/video.mp4`, file);
          
          if (error) {
            console.error('Video upload failed:', error);
          } else {
            console.log('Video uploaded:', data);
          }
        } else {
          alert("Please select a video file to upload.");
        }
      }

      function closeSMEUpload() { uploadSMEVideoModal.style.display = "none"; }

      // Initialize the page with default Home feed
      setTab(document.querySelector(".tabs button"), "home");
  </script>
  
</body>
</html>
