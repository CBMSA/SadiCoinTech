<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG Art Competition</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 80%;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #2d9d6b;
        }
        .button {
            background-color: #2d9d6b;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            display: inline-block;
        }
        .button:hover {
            background-color: #228b57;
        }
        .coin-image {
            width: 80%;
            max-width: 400px;
            margin-top: 20px;
            position: relative;
        }
        .coin-image img {
            width: 100%;
        }
        .blank-space {
            position: absolute;
            top: 30%;
            left: 30%;
            width: 40%;
            height: 40%;
            border: 3px dashed #2d9d6b;
            background-color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding-top: 20px;
            font-size: 18px;
            color: #2d9d6b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SDG Art Competition</h1>
        <p>Download the PDF to learn more about the SDG Art Competition and how to participate.</p>

        <a href="sdg_art_competition.pdf" class="button" download>Download PDF</a>

        <div class="coin-image">
            <!-- Replace with the image of your coin -->
            <img src="coin_image.png" alt="SDG Coin">
            <div class="blank-space">
                <p>Upload Your Design Here</p>
            </div>
        </div>
    </div>

</body>
</html>
