<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG Art Competition</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 80%;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #2d9d6b;
        }
        .button {
            background-color: #2d9d6b;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            display: inline-block;
        }
        .button:hover {
            background-color: #228b57;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SDG Art Competition</h1>
        <p>Click the button below to download the coin template for your SDG Art competition.</p>
        
        <button class="button" id="download-pdf">Download Template PDF</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        document.getElementById('download-pdf').addEventListener('click', function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Add the coin image (replace with your own coin image file if needed)
            const coinImage = 'coin_image.png'; // Placeholder image path

            // Create the coin template with blank space for drawing
            doc.setFontSize(22);
            doc.text('SDG Art Competition - Coin Template', 20, 20);

            // Placeholder for the coin with a blank space in the middle
            doc.setFillColor(255, 255, 255);
            doc.rect(20, 40, 170, 170, 'F'); // White rectangle for the blank space
            doc.setDrawColor(45, 157, 107); // SDG green color
            doc.setLineWidth(2);
            doc.rect(20, 40, 170, 170); // Drawing border for coin
            doc.setFontSize(16);
            doc.text('Draw Your Design Here', 50, 150); // Placeholder text

            // Add the coin background image
            // doc.addImage(coinImage, 'PNG', 20, 40, 170, 170); // Uncomment if you have an image

            // Save the PDF
            doc.save('sdg_art_competition_coin_template.pdf');
        });
    </script>

</body>
</html>
