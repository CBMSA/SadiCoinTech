<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cricket Scoring System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    section { margin-bottom: 20px; }
    button { padding: 15px; margin: 5px; font-size: 18px; cursor: pointer; width: 50px; height: 50px; }
    button:active { background-color: #ddd; }
    #scoreboard, #ballByBall { margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; }
    table, th, td { border: 1px solid #000; }
    th, td { padding: 10px; text-align: center; }
    th { background-color: #f4f4f4; }
    form input, form select { width: 100%; padding: 10px; margin-bottom: 10px; }
    footer { text-align: center; margin-top: 40px; font-size: 14px; }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); grid-gap: 10px; max-width: 300px; margin: 0 auto; }
    .keypad button { font-size: 16px; }
    .keypad .extra { background-color: #f0f0f0; }
    .keypad .submit { background-color: #28a745; color: white; grid-column: span 3; }
    .keypad .clear { background-color: #dc3545; color: white; grid-column: span 3; }

    .score-display { font-size: 20px; margin-bottom: 15px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Live Cricket Scoring System</h1>
  </header>

  <section id="scoreboard">
    <h2>Match Details</h2>
    <form id="matchDetailsForm">
      <label for="competition">Competition:</label>
      <input type="text" id="competition" name="competition" required>
      <label for="matchType">Match Type:</label>
      <select id="matchType" name="matchType">
        <option value="home">Home</option>
        <option value="away">Away</option>
      </select>
      <label for="innings">Innings:</label>
      <input type="text" id="innings" name="innings" required>
      <label for="date">Date:</label>
      <input type="date" id="date" name="date" required>
      <label for="venue">Venue:</label>
      <input type="text" id="venue" name="venue" required>
      <button type="submit">Save Match Details</button>
    </form>
  </section>

  <section id="ballByBall">
    <h2>Ball-by-Ball Scoring</h2>

    <div class="score-display">
      <p id="score">Runs: 0 | Wickets: 0 | Overs: 0.0 | Current Batsman: N/A | Bowler: N/A</p>
    </div>

    <!-- Scoring Pad Section -->
    <div class="keypad">
      <button class="run" data-value="0">0</button>
      <button class="run" data-value="1">1</button>
      <button class="run" data-value="2">2</button>
      <button class="run" data-value="3">3</button>
      <button class="run" data-value="4">4</button>
      <button class="run" data-value="5">5</button>
      <button class="run" data-value="6">6</button>
      <button class="extra" data-value="w">Wide</button>
      <button class="extra" data-value="nb">No-ball</button>
      <button class="run" data-value="by">Bye</button>
      <button class="run" data-value="lb">Leg Bye</button>
      <button class="out" data-value="bowled">Bowled</button>
      <button class="out" data-value="caught">Caught</button>
      <button class="out" data-value="run-out">Run-out</button>
      <button class="out" data-value="stumped">Stumped</button>

      <button class="submit">Submit</button>
      <button class="clear">Clear</button>
    </div>

    <!-- Ball-by-Ball Table -->
    <h3>Ball-by-Ball Details</h3>
    <table id="ballDetailsTable">
      <thead>
        <tr>
          <th>Ball</th>
          <th>Batsman</th>
          <th>Bowler</th>
          <th>Runs</th>
          <th>Extras</th>
          <th>Out</th>
        </tr>
      </thead>
      <tbody id="ballDetailsRows">
        <!-- Ball-by-ball details will be inserted here dynamically -->
      </tbody>
    </table>
  </section>

  <section id="summary">
    <h2>Match Summary</h2>
    <div id="matchSummary">
      <!-- Match summary will be displayed here -->
    </div>
    <button id="downloadReport">Download Match Summary</button>
  </section>

  <footer>
    <p>&copy; 2026 Cricket Scoring System. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let totalRuns = 0;
      let totalWickets = 0;
      let totalBalls = 0;
      let ballCount = 1;
      const ballDetailsTable = document.getElementById("ballDetailsRows");
      const scoreDisplay = document.getElementById("score");
      let currentBatsman = '';
      let currentBowler = '';
      let currentExtras = 0;
      let currentOut = '';

      // Handle scoring pad button clicks (runs, extras, outs)
      const buttons = document.querySelectorAll(".keypad button");
      let selectedRuns = 0;
      let selectedExtras = 0;
      let selectedOut = "";

      buttons.forEach(button => {
        button.addEventListener("click", () => {
          const value = button.dataset.value;

          if (value === 'w' || value === 'nb' || value === 'by' || value === 'lb') {
            selectedExtras = value;
            selectedRuns = 0;
          } else if (value === 'submit') {
            recordBall();
          } else if (value === 'clear') {
            resetInputs();
          } else {
            selectedRuns = value;
            selectedExtras = 0;
          }

          updateDisplay();
        });
      });

      // Record ball data
      function recordBall() {
        if (selectedRuns === 0 && selectedExtras === 0 && selectedOut === "") return;

        totalRuns += parseInt(selectedRuns, 10) || 0;
        currentExtras = selectedExtras;

        if (selectedOut) {
          totalWickets++;
        }

        totalBalls++;

        let overs = Math.floor(totalBalls / 6);
        let ballsInCurrentOver = totalBalls % 6;
        let oversDisplay = `${overs}.${ballsInCurrentOver}`;

        scoreDisplay.textContent = `Runs: ${totalRuns} | Wickets: ${totalWickets} | Overs: ${oversDisplay}`;

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${ballCount}</td>
          <td>${currentBatsman}</td>
          <td>${currentBowler}</td>
          <td>${selectedRuns}</td>
          <td>${currentExtras}</td>
          <td>${selectedOut || '-'}</td>
        `;
        ballDetailsTable.appendChild(row);

        ballCount++;
        resetInputs();
      }

      // Update the display after each selection
      function updateDisplay() {
        scoreDisplay.textContent = `Runs: ${totalRuns} | Wickets: ${totalWickets} | Overs: ${totalBalls / 6}.${totalBalls % 6}`;
      }

      // Reset all inputs
      function resetInputs() {
        selectedRuns = 0;
        selectedExtras = 0;
        selectedOut = '';
        currentExtras = 0;
        currentOut = '';
      }
    });
  </script>
</body>
</html>
