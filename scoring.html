<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cricket Scoring System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    section {
      margin-bottom: 20px;
    }

    button {
      padding: 10px;
      margin: 10px 0;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table, th, td {
      border: 1px solid #000;
    }

    th, td {
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #f4f4f4;
    }

    form input, form select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Cricket Scoring System</h1>
  </header>

  <section id="scoreboard">
    <h2>Match Details</h2>
    <form id="matchDetailsForm">
      <label for="competition">Competition:</label>
      <input type="text" id="competition" name="competition" required>

      <label for="matchType">Match Type:</label>
      <select id="matchType" name="matchType">
        <option value="home">Home</option>
        <option value="away">Away</option>
      </select>

      <label for="innings">Innings:</label>
      <input type="text" id="innings" name="innings" required>

      <label for="date">Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="venue">Venue:</label>
      <input type="text" id="venue" name="venue" required>

      <button type="submit">Save Match Details</button>
    </form>
  </section>

  <section id="batsmanDetails">
    <h2>Batsman Scoring</h2>
    <table id="batsmanTable">
      <thead>
        <tr>
          <th>Batsman</th>
          <th>Runs</th>
          <th>Balls</th>
          <th>Fours</th>
          <th>Sixes</th>
          <th>Out (How)</th>
          <th>Fielder</th>
          <th>Bowler</th>
        </tr>
      </thead>
      <tbody id="batsmanRows">
        <!-- Batsman details will be inserted here dynamically -->
      </tbody>
    </table>
    <button id="addBatsmanRow">Add Batsman</button>
  </section>

  <section id="bowlerDetails">
    <h2>Bowler Scoring</h2>
    <table id="bowlerTable">
      <thead>
        <tr>
          <th>Bowler</th>
          <th>Overs</th>
          <th>Runs</th>
          <th>Wickets</th>
          <th>Extras</th>
        </tr>
      </thead>
      <tbody id="bowlerRows">
        <!-- Bowler details will be inserted here dynamically -->
      </tbody>
    </table>
    <button id="addBowlerRow">Add Bowler</button>
  </section>

  <section id="summary">
    <h2>Match Summary</h2>
    <div id="matchSummary">
      <!-- Summary content will be inserted here dynamically -->
    </div>
    <button id="downloadReport">Download Summary Report</button>
  </section>

  <footer>
    <p>&copy; 2026 Cricket Scoring System. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let batsmanRowCounter = 1;
      let bowlerRowCounter = 1;

      const batsmanTable = document.getElementById("batsmanRows");
      const bowlerTable = document.getElementById("bowlerRows");

      // Add new batsman row
      document.getElementById("addBatsmanRow").addEventListener("click", () => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td><input type="text" name="batsman${batsmanRowCounter}" required /></td>
          <td><input type="number" name="runs${batsmanRowCounter}" required /></td>
          <td><input type="number" name="balls${batsmanRowCounter}" required /></td>
          <td><input type="number" name="fours${batsmanRowCounter}" required /></td>
          <td><input type="number" name="sixes${batsmanRowCounter}" required /></td>
          <td><input type="text" name="out${batsmanRowCounter}" /></td>
          <td><input type="text" name="fielder${batsmanRowCounter}" /></td>
          <td><input type="text" name="bowler${batsmanRowCounter}" /></td>
        `;

        batsmanTable.appendChild(row);
        batsmanRowCounter++;
      });

      // Add new bowler row
      document.getElementById("addBowlerRow").addEventListener("click", () => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td><input type="text" name="bowlerName${bowlerRowCounter}" required /></td>
          <td><input type="number" name="overs${bowlerRowCounter}" required /></td>
          <td><input type="number" name="runsBowled${bowlerRowCounter}" required /></td>
          <td><input type="number" name="wickets${bowlerRowCounter}" required /></td>
          <td><input type="number" name="extras${bowlerRowCounter}" /></td>
        `;

        bowlerTable.appendChild(row);
        bowlerRowCounter++;
      });

      // Handle match details form submission
      document.getElementById("matchDetailsForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const competition = document.getElementById("competition").value;
        const matchType = document.getElementById("matchType").value;
        const innings = document.getElementById("innings").value;
        const date = document.getElementById("date").value;
        const venue = document.getElementById("venue").value;

        const summary = `
          <p><strong>Competition:</strong> ${competition}</p>
          <p><strong>Match Type:</strong> ${matchType}</p>
          <p><strong>Innings:</strong> ${innings}</p>
          <p><strong>Date:</strong> ${date}</p>
          <p><strong>Venue:</strong> ${venue}</p>
        `;

        document.getElementById("matchSummary").innerHTML = summary;
      });

      // DLS Calculation (Simple Example)
      function calculateDLS(parScore, oversLost) {
        const dlsFactor = 1.5;  // Sample factor for demonstration
        return parScore - (oversLost * dlsFactor);
      }

      // Generate and download summary report
      document.getElementById("downloadReport").addEventListener("click", () => {
        const summaryContent = document.getElementById("matchSummary").innerHTML;
        const reportContent = `Cricket Match Summary:\n\n${summaryContent}`;

        const blob = new Blob([reportContent], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "match_summary.txt";
        link.click();
      });
    });
  </script>
</body>
</html>
