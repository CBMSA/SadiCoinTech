<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cricket Scoring System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; padding: 20px; }
    header { text-align: center; margin-bottom: 20px; }
    section { margin-bottom: 20px; }
    button { padding: 10px; margin: 10px 0; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    table, th, td { border: 1px solid #000; }
    th, td { padding: 10px; text-align: center; }
    th { background-color: #f4f4f4; }
    form input, form select { width: 100%; padding: 10px; margin-bottom: 10px; }
    footer { text-align: center; margin-top: 40px; font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <h1>Live Cricket Scoring System</h1>
  </header>

  <!-- Match Details -->
  <section id="scoreboard">
    <h2>Match Details</h2>
    <form id="matchDetailsForm">
      <label for="competition">Competition:</label>
      <input type="text" id="competition" name="competition" required>

      <label for="matchType">Match Type:</label>
      <select id="matchType" name="matchType">
        <option value="home">Home</option>
        <option value="away">Away</option>
      </select>

      <label for="innings">Innings:</label>
      <input type="text" id="innings" name="innings" required>

      <label for="date">Date:</label>
      <input type="date" id="date" name="date" required>

      <label for="venue">Venue:</label>
      <input type="text" id="venue" name="venue" required>

      <button type="submit">Save Match Details</button>
    </form>
  </section>

  <!-- Ball-by-Ball Scoring Section -->
  <section id="ballByBall">
    <h2>Ball-by-Ball Scoring</h2>
    <form id="ballForm">
      <label for="batsman">Batsman:</label>
      <input type="text" id="batsman" name="batsman" required />

      <label for="bowler">Bowler:</label>
      <input type="text" id="bowler" name="bowler" required />

      <label for="runs">Runs:</label>
      <input type="number" id="runs" name="runs" min="0" max="6" required />

      <label for="extras">Extras:</label>
      <input type="number" id="extras" name="extras" min="0" required />

      <label for="out">Out:</label>
      <input type="text" id="out" name="out" placeholder="Optional" />

      <button type="submit">Record Ball</button>
    </form>

    <h3>Current Score</h3>
    <p id="score">Runs: 0 | Wickets: 0 | Overs: 0.0</p>

    <h3>Ball-by-Ball Details</h3>
    <table id="ballDetailsTable">
      <thead>
        <tr>
          <th>Ball</th>
          <th>Batsman</th>
          <th>Bowler</th>
          <th>Runs</th>
          <th>Extras</th>
          <th>Out</th>
        </tr>
      </thead>
      <tbody id="ballDetailsRows">
        <!-- Ball-by-ball details will be inserted here dynamically -->
      </tbody>
    </table>
  </section>

  <!-- Match Summary Section -->
  <section id="summary">
    <h2>Match Summary</h2>
    <div id="matchSummary">
      <!-- Match summary will be displayed here -->
    </div>
    <button id="downloadReport">Download Match Summary</button>
  </section>

  <footer>
    <p>&copy; 2026 Cricket Scoring System. All rights reserved.</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let totalRuns = 0;
      let totalWickets = 0;
      let totalBalls = 0;
      let ballCount = 1;
      const ballDetailsTable = document.getElementById("ballDetailsRows");
      const scoreDisplay = document.getElementById("score");

      // Handle the submission of a ball's data
      document.getElementById("ballForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const batsman = document.getElementById("batsman").value;
        const bowler = document.getElementById("bowler").value;
        const runs = parseInt(document.getElementById("runs").value, 10);
        const extras = parseInt(document.getElementById("extras").value, 10);
        const out = document.getElementById("out").value;

        // Update total runs and wickets if applicable
        totalRuns += runs + extras;
        if (out) totalWickets++;

        // Increment balls
        totalBalls++;

        // Calculate overs (example: 6 balls = 1 over)
        let overs = Math.floor(totalBalls / 6);
        let ballsInCurrentOver = totalBalls % 6;
        let oversDisplay = `${overs}.${ballsInCurrentOver}`;

        // Display the updated score
        scoreDisplay.textContent = `Runs: ${totalRuns} | Wickets: ${totalWickets} | Overs: ${oversDisplay}`;

        // Create a new row for the ball-by-ball table
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${ballCount}</td>
          <td>${batsman}</td>
          <td>${bowler}</td>
          <td>${runs}</td>
          <td>${extras}</td>
          <td>${out || '-'}</td>
        `;
        ballDetailsTable.appendChild(row);

        // Increment the ball count
        ballCount++;

        // Clear the form inputs
        document.getElementById("batsman").value = '';
        document.getElementById("bowler").value = '';
        document.getElementById("runs").value = '';
        document.getElementById("extras").value = '';
        document.getElementById("out").value = '';
      });

      // Handle match details form submission
      document.getElementById("matchDetailsForm").addEventListener("submit", (e) => {
        e.preventDefault();

        const competition = document.getElementById("competition").value;
        const matchType = document.getElementById("matchType").value;
        const innings = document.getElementById("innings").value;
        const date = document.getElementById("date").value;
        const venue = document.getElementById("venue").value;

        const summary = `
          <p><strong>Competition:</strong> ${competition}</p>
          <p><strong>Match Type:</strong> ${matchType}</p>
          <p><strong>Innings:</strong> ${innings}</p>
          <p><strong>Date:</strong> ${date}</p>
          <p><strong>Venue:</strong> ${venue}</p>
        `;

        document.getElementById("matchSummary").innerHTML = summary;
      });

      // DLS Calculation (Simple Example)
      function calculateDLS(parScore, oversLost) {
        const dlsFactor = 1.5;  // Sample factor for demonstration
        return parScore - (oversLost * dlsFactor);
      }

      // Generate and download match summary
      document.getElementById("downloadReport").addEventListener("click", () => {
        const summaryContent = document.getElementById("matchSummary").innerHTML;
        const reportContent = `Cricket Match Summary:\n\n${summaryContent}`;

        const blob = new Blob([reportContent], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "match_summary.txt";
        link.click();
      });
    });
  </script>
</body>
</html>
